    <div class="container">

        <main class="content">
            <div class="professor-image">
                <img src="professor.gif" alt="教授" class="circular-gif">
            </div>
            <div class="speech-bubble">
                <p>勉強をするだけでなく、部活動でも趣味でも自分の興味のあることや取り組むべき課題に一生懸命向き合ってください。その結果、後に役に立つものが得られるはずです。勉強はもちろん大切ですが、それだけではなく今しかできない経験をしてほしいのです。
</p>
            </div>
            <div class="speech-bubble">
                <p>私の場合、高校時代は部活動でラグビーに打ち込んでいました。ラグビーはけがの多いスポーツなので勇気がいりますが、そのおかげで精神力が鍛えられ、そのマインドが今でも前向きな研究活動に生かされています。後悔しないように、高校時代にしかできないことに打ち込んでみてください。
</p>
            </div>
        </main>
